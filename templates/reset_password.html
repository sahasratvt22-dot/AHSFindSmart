{% extends "base.html" %}
{% block content %}

<section class="page-head">
  <div class="container">
    <h1>Choose a New Password</h1>
    <p class="muted">Set a new password for your {{ user_type }} account.</p>
  </div>
</section>

<section class="container">
  <form class="form-card admin-login-card student-auth-card" method="POST">
    <div class="field">
      <label for="password">New password</label>
      <input id="password" name="password" type="password" required autocomplete="new-password" />
    </div>
    <div class="field">
      <label for="confirm_password">Confirm new password</label>
      <input id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password" />
    </div>

    <div class="field actions">
      <button class="btn" type="submit">Reset Password</button>
      <a class="btn btn-outline" href="{{ url_for('home') }}">Cancel</a>
    </div>
  </form>
</section>

{% endblock %}
